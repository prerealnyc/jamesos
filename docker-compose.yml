services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: james_os_postgres
    environment:
      POSTGRES_USER: james_os
      POSTGRES_PASSWORD: james_os
      POSTGRES_DB: james_os
    ports:
      - "5433:5432"
    volumes:
      - james_os_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U james_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  james_os_pgdata:
